<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WOW Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      overflow: hidden;
      touch-action: manipulation;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: #bfe7ff;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const BASE_W = 709;
const BASE_H = 1536;

function fitCanvas() {
  const ww = window.innerWidth;
  const wh = window.innerHeight;
  const ratio = BASE_W / BASE_H;
  const screenRatio = ww / wh;

  if (screenRatio > ratio) {
    canvas.height = wh;
    canvas.width = wh * ratio;
  } else {
    canvas.width = ww;
    canvas.height = ww / ratio;
  }
}

fitCanvas();
window.addEventListener("resize", fitCanvas);

function sx(v) {
  return v * canvas.width / BASE_W;
}

function sy(v) {
  return v * canvas.height / BASE_H;
}

/* =========================
   ASSETS
========================= */

const images = {
  bg: new Image(),
  ground: new Image(),
  chick: new Image(),
  box: new Image()
};

images.bg.src = "assets/background.png";
images.ground.src = "assets/ground.png";
images.chick.src = "assets/chick.png";
images.box.src = "assets/box.png";

/* =========================
   CONFIG
========================= */

const config = {
  UNIT: 96,

  birdSizeFactor: 0.9,
  birdX: 155,
  birdStartY: 650,

  groundHeight: 320,

  gravity: 1.05,
  flap: -17.5,
  maxFall: 24,

  pipeWidth: 96,
  firstPipeOffset: 360,

  scoreX: 30,
  scoreY: 110
};

function getDifficulty(score) {
  // Первые 6 препятствий — сильно проще
  if (score < 6) {
    return {
      name: "easy",
      speed: 7.2,
      spacing: 520,
      gapUnits: 5,
      minTop: 1,
      maxTop: 2,
      minBottom: 1,
      maxBottom: 2
    };
  }

  if (score < 15) {
    return {
      name: "medium",
      speed: 8.5,
      spacing: 430,
      gapUnits: 4,
      minTop: 1,
      maxTop: 4,
      minBottom: 1,
      maxBottom: 4
    };
  }

  return {
    name: "hard",
    speed: 9.6,
    spacing: 360,
    gapUnits: 3,
    minTop: 2,
    maxTop: 6,
    minBottom: 2,
    maxBottom: 6
  };
}

const game = {
  state: "ready",
  score: 0,
  best: Number(localStorage.getItem("wowgame_best") || 0)
};

const bird = {
  x: config.birdX,
  y: config.birdStartY,
  w: config.UNIT * config.birdSizeFactor,
  h: config.UNIT * config.birdSizeFactor,
  vy: 0,
  rotation: 0
};

let pipes = [];
let groundOffset = 0;
let backgroundOffset = 0;

/* =========================
   HELPERS
========================= */

function groundTopY() {
  return BASE_H - config.groundHeight;
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* =========================
   PIPES
========================= */

function createPipePair(x) {
  const diff = getDifficulty(game.score);
  const playableUnits = Math.floor(groundTopY() / config.UNIT);

  let topBlocks = diff.minTop;
  let bottomBlocks = diff.minBottom;

  // Подбираем пару так, чтобы gap всегда был безопасным
  for (let attempt = 0; attempt < 30; attempt++) {
    const t = randomInt(diff.minTop, diff.maxTop);
    const b = randomInt(diff.minBottom, diff.maxBottom);

    if (t + b + diff.gapUnits <= playableUnits) {
      topBlocks = t;
      bottomBlocks = b;
      break;
    }
  }

  return {
    x,
    width: config.pipeWidth,
    topBlocks,
    bottomBlocks,
    passed: false
  };
}

function resetGame() {
  game.state = "ready";
  game.score = 0;

  bird.x = config.birdX;
  bird.y = config.birdStartY;
  bird.vy = 0;
  bird.rotation = 0;

  groundOffset = 0;
  backgroundOffset = 0;
  pipes = [];

  const diff = getDifficulty(0);
  const startX = BASE_W + config.firstPipeOffset;

  for (let i = 0; i < 4; i++) {
    pipes.push(createPipePair(startX + i * diff.spacing));
  }
}

/* =========================
   CONTROLS
========================= */

function jump() {
  if (game.state === "ready") {
    game.state = "playing";
  } else if (game.state === "gameover") {
    resetGame();
    return;
  }

  bird.vy = config.flap;
  bird.rotation = -0.6;
}

window.addEventListener("mousedown", jump);

window.addEventListener("touchstart", (e) => {
  e.preventDefault();
  jump();
}, { passive: false });

window.addEventListener("keydown", (e) => {
  if (e.code === "Space") jump();
});

/* =========================
   UPDATE
========================= */

function update() {
  if (game.state === "ready") {
    bird.y = config.birdStartY + Math.sin(Date.now() * 0.006) * 8;
    bird.rotation = -0.08;
    return;
  }

  if (game.state !== "playing") return;

  const diff = getDifficulty(game.score);
  const worldSpeed = diff.speed;

  // ВАЖНО:
  // коробки и ground двигаются с одинаковой скоростью
  groundOffset -= worldSpeed;

  // фон двигается медленнее — параллакс
  backgroundOffset -= worldSpeed * 0.16;

  bird.vy += config.gravity;
  if (bird.vy > config.maxFall) bird.vy = config.maxFall;

  bird.y += bird.vy;
  bird.rotation = Math.max(-0.7, Math.min(1.4, bird.vy * 0.055));

  for (const pipe of pipes) {
    pipe.x -= worldSpeed;

    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      pipe.passed = true;
      game.score += 1;

      if (game.score > game.best) {
        game.best = game.score;
        localStorage.setItem("wowgame_best", game.best);
      }
    }
  }

  if (pipes.length && pipes[0].x + pipes[0].width < -config.UNIT) {
    pipes.shift();

    const newDiff = getDifficulty(game.score);
    const lastX = pipes[pipes.length - 1].x;

    pipes.push(createPipePair(lastX + newDiff.spacing));
  }

  checkCollision();
}

/* =========================
   COLLISION
========================= */

function rectsOverlap(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function checkCollision() {
  const birdRect = {
    x: bird.x,
    y: bird.y,
    w: bird.w,
    h: bird.h
  };

  if (bird.y + bird.h > groundTopY()) {
    bird.y = groundTopY() - bird.h;
    game.state = "gameover";
    return;
  }

  if (bird.y < 0) {
    bird.y = 0;
    bird.vy = 0;
  }

  for (const pipe of pipes) {
    for (let i = 0; i < pipe.topBlocks; i++) {
      const boxRect = {
        x: pipe.x,
        y: i * config.UNIT,
        w: config.UNIT,
        h: config.UNIT
      };

      if (rectsOverlap(birdRect, boxRect)) {
        game.state = "gameover";
        return;
      }
    }

    for (let i = 0; i < pipe.bottomBlocks; i++) {
      const boxRect = {
        x: pipe.x,
        y: groundTopY() - config.UNIT * (i + 1),
        w: config.UNIT,
        h: config.UNIT
      };

      if (rectsOverlap(birdRect, boxRect)) {
        game.state = "gameover";
        return;
      }
    }
  }
}

/* =========================
   DRAW
========================= */

function drawBackground() {
  const offset = ((backgroundOffset % BASE_W) + BASE_W) % BASE_W;

  ctx.drawImage(
    images.bg,
    sx(-offset),
    0,
    canvas.width,
    canvas.height
  );

  ctx.drawImage(
    images.bg,
    sx(BASE_W - offset),
    0,
    canvas.width,
    canvas.height
  );
}

function drawGround() {
  const offset = ((groundOffset % BASE_W) + BASE_W) % BASE_W;

  ctx.drawImage(
    images.ground,
    sx(-offset),
    sy(groundTopY()),
    canvas.width,
    sy(config.groundHeight)
  );

  ctx.drawImage(
    images.ground,
    sx(BASE_W - offset),
    sy(groundTopY()),
    canvas.width,
    sy(config.groundHeight)
  );
}

function drawBox(x, y) {
  ctx.drawImage(
    images.box,
    sx(x),
    sy(y),
    sx(config.UNIT),
    sy(config.UNIT)
  );
}

function drawPipes() {
  for (const pipe of pipes) {
    for (let i = 0; i < pipe.topBlocks; i++) {
      drawBox(pipe.x, i * config.UNIT);
    }

    for (let i = 0; i < pipe.bottomBlocks; i++) {
      drawBox(
        pipe.x,
        groundTopY() - config.UNIT * (i + 1)
      );
    }
  }
}

function drawBird() {
  ctx.save();

  const cx = sx(bird.x + bird.w / 2);
  const cy = sy(bird.y + bird.h / 2);

  ctx.translate(cx, cy);
  ctx.rotate(bird.rotation);

  ctx.drawImage(
    images.chick,
    -sx(bird.w) / 2,
    -sy(bird.h) / 2,
    sx(bird.w),
    sy(bird.h)
  );

  ctx.restore();
}

function drawUI() {
  ctx.shadowColor = "rgba(0,0,0,0.45)";
  ctx.shadowBlur = 6;

  ctx.fillStyle = "#fff";
  ctx.font = `bold ${sx(82)}px Arial`;
  ctx.fillText(String(game.score), sx(config.scoreX), sy(config.scoreY));

  const diff = getDifficulty(game.score);

  ctx.font = `bold ${sx(24)}px Arial`;
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.fillText(diff.name.toUpperCase(), sx(30), sy(150));

  ctx.shadowBlur = 0;

  if (game.state === "ready") {
    ctx.textAlign = "center";

    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.fillRect(sx(120), sy(390), sx(470), sy(150));

    ctx.shadowColor = "rgba(0,0,0,0.4)";
    ctx.shadowBlur = 6;

    ctx.fillStyle = "#fff";
    ctx.font = `bold ${sx(42)}px Arial`;
    ctx.fillText("Tap to Start", canvas.width / 2, sy(455));

    ctx.font = `${sx(26)}px Arial`;
    ctx.fillText("Пролети между коробками", canvas.width / 2, sy(500));

    ctx.shadowBlur = 0;
    ctx.textAlign = "start";
  }

  if (game.state === "gameover") {
    ctx.fillStyle = "rgba(0,0,0,0.42)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = "center";

    ctx.shadowColor = "rgba(0,0,0,0.45)";
    ctx.shadowBlur = 8;

    ctx.fillStyle = "#fff";
    ctx.font = `bold ${sx(58)}px Arial`;
    ctx.fillText("Game Over", canvas.width / 2, sy(440));

    ctx.font = `bold ${sx(34)}px Arial`;
    ctx.fillText(`Score: ${game.score}`, canvas.width / 2, sy(520));
    ctx.fillText(`Best: ${game.best}`, canvas.width / 2, sy(570));

    ctx.font = `${sx(28)}px Arial`;
    ctx.fillText("Tap to restart", canvas.width / 2, sy(650));

    ctx.shadowBlur = 0;
    ctx.textAlign = "start";
  }
}

/* =========================
   RENDER
========================= */

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBackground();

  // Коробки рисуем до ground, чтобы нижние коробки выглядели стоящими из ground-линии
  drawPipes();

  drawGround();

  drawBird();

  drawUI();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

/* =========================
   START
========================= */

let loaded = 0;
const totalImages = Object.keys(images).length;

Object.values(images).forEach(img => {
  img.onload = () => {
    loaded++;
    if (loaded === totalImages) {
      resetGame();
      requestAnimationFrame(loop);
    }
  };
});
</script>
</body>
</html>
